<div class="salary-modal">
  <div class="sm-root">
    <div class="sm-head">
      <div>
        <h3 class="sm-title">Смены — {{ user_name }}</h3>
        <div class="sm-sub">Месяц: <b>{{ month }}</b></div>
      </div>
    </div>

    <div class="sm-grid">
      <div class="sm-pane">
        <div class="sm-table-wrap">
          <table class="sm-table">
            <thead>
              <tr>
                <th>Дата</th>
                <th>Статус</th>
                <th>Часы (план/факт)</th>
                <th>Сумма</th>
              </tr>
            </thead>
            <tbody id="salary-shifts-body">
              <tr><td colspan="4" style="color:#667085; padding:14px;">Загрузка…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="sm-pane pad">
        <div class="sm-form-head">
          <div class="sm-form-title">Редактирование смены</div>
          <div id="salary-shift-selected" class="sm-form-date">Выберите смену</div>
        </div>

        <div id="salary-shift-payinfo" class="sm-section" style="margin-top:0; display:none;">
          <div class="sm-section-title">Оплата за смену</div>
          <div id="salary-shift-payinfo-body"></div>
        </div>

        <div id="salary-shift-form" style="display:none;">
          <div class="sm-fields">
            <label class="sm-label">
              Статус
              <select id="salary-shift-state" class="input">
                <option value="worked">Отработано</option>
                <option value="day_off">Выходной</option>
                <option value="overtime">Переработка</option>
                <option value="skip">Пропуск</option>
                <option value="needs_review">Требует подтверждения</option>
              </select>
            </label>

            <label class="sm-label">
              Ручные часы (опц.)
              <input id="salary-shift-manual-hours" class="input" type="text" placeholder="например, 8" />
            </label>

            <label class="sm-label">
              Ручная сумма (опц.)
              <input id="salary-shift-manual-amount" class="input" type="text" placeholder="например, 2500" />
            </label>
            <div></div>
          </div>

          <label class="sm-label" style="margin-top:10px;">
            Комментарий
            <textarea id="salary-shift-comment" class="input" rows="4" placeholder="обязательно при изменениях"></textarea>
          </label>

          <div class="sm-section">
            <div class="sm-section-title">Запрошенная сумма</div>
            <div class="sm-fields" style="margin-top:10px;">
              <label class="sm-label">
                Сумма за смену, ₽
                <input id="salary-shift-requested-amount" class="input" type="text" placeholder="например, 3500" />
              </label>
              <div></div>
            </div>
            <div id="salary-shift-amount-error" class="crm-ui-dialog-error" style="display:none; margin-top:8px;"></div>
            <div class="sm-actions" style="margin-top:10px; justify-content:flex-end; gap:10px;">
              <button id="salary-shift-amount-save" class="btn-outline" type="button">Сохранить сумму</button>
              <button id="salary-shift-amount-approve" class="btn" type="button">Подтвердить сумму</button>
            </div>
          </div>

          <div id="salary-shift-error" class="crm-ui-dialog-error" style="display:none; margin-top:8px;"></div>

          <div class="sm-actions">
            <button id="salary-shift-save" class="btn" type="button">Сохранить</button>
            <button id="salary-shift-confirm" class="btn-outline" type="button" style="display:none;">Подтвердить смену</button>
          </div>

          <div class="sm-section">
            <div class="sm-section-title">Корректировки</div>
            <div id="salary-shift-adjustments"></div>

            <div class="sm-fields" style="margin-top:10px;">
              <label class="sm-label">
                Сумма, ₽
                <input id="salary-adj-delta" class="input" type="text" placeholder="-500 или 500" />
              </label>
              <label class="sm-label">
                Комментарий
                <input id="salary-adj-comment" class="input" type="text" placeholder="обязательно" />
              </label>
            </div>

            <div id="salary-adj-error" class="crm-ui-dialog-error" style="display:none; margin-top:8px;"></div>
            <div style="display:flex; justify-content:flex-end; margin-top:10px;">
              <button id="salary-adj-add" class="btn-outline" type="button">Добавить корректировку</button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function(){
  const body = document.getElementById('salary-shifts-body');
  const userId = Number('{{ user_id }}');
  const month = String('{{ month }}' || '').trim();

  const selectedEl = document.getElementById('salary-shift-selected');
  const formWrap = document.getElementById('salary-shift-form');
  const stateEl = document.getElementById('salary-shift-state');
  const mhEl = document.getElementById('salary-shift-manual-hours');
  const maEl = document.getElementById('salary-shift-manual-amount');
  const cEl = document.getElementById('salary-shift-comment');
  const errEl = document.getElementById('salary-shift-error');
  const saveBtn = document.getElementById('salary-shift-save');
  const confirmBtn = document.getElementById('salary-shift-confirm');

  const reqAmtEl = document.getElementById('salary-shift-requested-amount');
  const amtErrEl = document.getElementById('salary-shift-amount-error');
  const amtSaveBtn = document.getElementById('salary-shift-amount-save');
  const amtApproveBtn = document.getElementById('salary-shift-amount-approve');

  const payInfoWrap = document.getElementById('salary-shift-payinfo');
  const payInfoBody = document.getElementById('salary-shift-payinfo-body');

  const adjListEl = document.getElementById('salary-shift-adjustments');
  const adjDeltaEl = document.getElementById('salary-adj-delta');
  const adjCommentEl = document.getElementById('salary-adj-comment');
  const adjErrEl = document.getElementById('salary-adj-error');
  const adjAddBtn = document.getElementById('salary-adj-add');

  let shifts = [];
  let selectedKey = '';

  function apiBase(){
    const m = document.querySelector('meta[name="crm-api-base"]');
    return (m && m.getAttribute('content')) ? m.getAttribute('content') : '/crm/api';
  }

  try {
    if(confirmBtn) confirmBtn.addEventListener('click', confirmShift);
  } catch(_){ }

  async function reloadAndReselect(){
    const keep = String(selectedKey || '');
    await load();
    if(keep) selectShift(keep);
  }

  async function saveRequestedAmount(){
    if(!selectedKey) return;
    const it = findShift(selectedKey);
    if(!it) return;
    const sid = Number(it.shift_id || 0);
    if(sid <= 0) return;
    setErr(amtErrEl, null);
    const v = String(reqAmtEl && reqAmtEl.value ? reqAmtEl.value : '').trim();
    if(!v){
      setErr(amtErrEl, 'Введите сумму');
      return;
    }
    try {
      if(amtSaveBtn) amtSaveBtn.disabled = true;
      if(amtApproveBtn) amtApproveBtn.disabled = true;
      const r = await fetch(apiBase() + '/salaries/shifts/' + String(sid) + '/amount/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ month: month, amount: v }),
      });
      if(r.status === 403){ window.location.href = '/crm/salaries'; return; }
      const d = await r.json().catch(()=> ({}));
      if(!d || !d.ok){
        setErr(amtErrEl, 'Не удалось сохранить сумму');
        return;
      }
      await reloadAndReselect();
      try { window.dispatchEvent(new CustomEvent('salary-grid-refresh')); } catch(_) {}
    } catch(_e){
      setErr(amtErrEl, 'Ошибка сохранения');
    } finally {
      try { if(amtSaveBtn) amtSaveBtn.disabled = false; } catch(_){ }
      try {
        const it2 = findShift(selectedKey);
        if(amtApproveBtn) amtApproveBtn.disabled = !(it2 && it2.approval_required);
      } catch(_){ }
    }
  }

  async function approveRequestedAmount(){
    if(!selectedKey) return;
    const it = findShift(selectedKey);
    if(!it) return;
    const sid = Number(it.shift_id || 0);
    if(sid <= 0) return;
    setErr(amtErrEl, null);
    try {
      if(amtApproveBtn) amtApproveBtn.disabled = true;
      if(amtSaveBtn) amtSaveBtn.disabled = true;
      const r = await fetch(apiBase() + '/salaries/shifts/' + String(sid) + '/amount/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: '{}',
      });
      if(r.status === 403){ window.location.href = '/crm/salaries'; return; }
      const d = await r.json().catch(()=> ({}));
      if(!d || !d.ok){
        const code = String(d && d.error ? d.error : 'bad');
        if(code === 'no_requested_amount') setErr(amtErrEl, 'Нет запрошенной суммы');
        else setErr(amtErrEl, 'Не удалось подтвердить');
        return;
      }
      await reloadAndReselect();
      try { window.dispatchEvent(new CustomEvent('salary-grid-refresh')); } catch(_) {}
    } catch(_e){
      setErr(amtErrEl, 'Ошибка подтверждения');
    } finally {
      try { if(amtSaveBtn) amtSaveBtn.disabled = false; } catch(_){ }
      try {
        const it2 = findShift(selectedKey);
        if(amtApproveBtn) amtApproveBtn.disabled = !(it2 && it2.approval_required);
      } catch(_){ }
    }
  }

  function setMsg(msg){
    if(!body) return;
    body.innerHTML = '<tr><td colspan="4" style="color:#667085; padding:12px;">' + String(msg || '') + '</td></tr>';
  }

  function setErr(target, msg){
    if(!target) return;
    if(!msg){
      target.style.display = 'none';
      target.textContent = '';
      return;
    }
    target.style.display = 'block';
    target.textContent = String(msg);
  }

  function shiftKey(it){
    const sid = Number(it && it.shift_id ? it.shift_id : 0);
    if(sid > 0) return 'id:' + String(sid);
    return 'day:' + String(it && it.day ? it.day : '');
  }

  function findShift(key){
    const k = String(key || '');
    for (let i=0;i<shifts.length;i++){
      if(shiftKey(shifts[i]) === k) return shifts[i];
    }
    return null;
  }

  function selectShift(key){
    selectedKey = String(key || '');
    const it = findShift(selectedKey);
    if(!it){
      if(selectedEl) selectedEl.textContent = 'Выберите смену слева';
      if(formWrap) formWrap.style.display = 'none';
      return;
    }
    if(selectedEl) selectedEl.textContent = String(it.day || '');
    if(formWrap) formWrap.style.display = '';

    try { if(stateEl) stateEl.value = String(it.state || 'worked'); } catch(_) {}
    try { if(mhEl) mhEl.value = String(it.manual_hours || ''); } catch(_) {}
    try { if(maEl) maEl.value = String(it.manual_amount_override || ''); } catch(_) {}
    try { if(cEl) cEl.value = String(it.comment || ''); } catch(_) {}
    try { if(reqAmtEl) reqAmtEl.value = String(it.requested_amount || ''); } catch(_) {}
    setErr(errEl, null);
    setErr(adjErrEl, null);
    setErr(amtErrEl, null);

    const sid = Number(it.shift_id || 0);
    const plannedOnly = (sid <= 0);
    try {
      if(reqAmtEl) reqAmtEl.disabled = plannedOnly;
      if(amtSaveBtn) amtSaveBtn.disabled = plannedOnly;
      if(amtApproveBtn) amtApproveBtn.disabled = plannedOnly || !(it && it.approval_required);
    } catch(_){ }

    try {
      if(adjDeltaEl) adjDeltaEl.disabled = plannedOnly;
      if(adjCommentEl) adjCommentEl.disabled = plannedOnly;
      if(adjAddBtn) adjAddBtn.disabled = plannedOnly;
    } catch(_){ }

    try {
      if(amtApproveBtn){
        amtApproveBtn.disabled = !(it && it.approval_required);
      }
    } catch(_){ }

    try {
      if(confirmBtn){
        const need = !!(it && it.needs_review);
        confirmBtn.style.display = need ? '' : 'none';
      }
    } catch(_){ }

    renderPayInfo(it);
    renderAdjustments(it);
  }

  function renderAdjustments(it){
    if(!adjListEl) return;
    const list = Array.isArray(it && it.adjustments) ? it.adjustments : [];
    if(!list.length){
      adjListEl.innerHTML = '<div class="sm-adj-empty">Пока нет корректировок</div>';
      return;
    }
    adjListEl.innerHTML = list.map((a)=>{
      const d = String(a.delta_amount || '0');
      const c = String(a.comment || '').trim();
      return '<div class="sm-adj-item">' +
        '<div><b>' + d + ' ₽</b>' + (c ? (' — ' + c) : '') + '</div>' +
      '</div>';
    }).join('');
  }

  function statusBadge(state, it){
    const s = String(state || 'worked');
    const sid = Number(it && it.shift_id ? it.shift_id : 0);
    const isPlannedOnly = (sid <= 0);
    if(isPlannedOnly) return '<span class="sm-badge orange">⚠️ Не отмечено</span>';
    if(s === 'worked') return '<span class="sm-badge green">✅ Отработано</span>';
    if(s === 'day_off') return '<span class="sm-badge yellow">🟡 Выходной</span>';
    if(s === 'overtime') return '<span class="sm-badge purple">⚡ Переработка</span>';
    if(s === 'skip') return '<span class="sm-badge red">❌ Пропуск</span>';
    if(s === 'needs_review') return '<span class="sm-badge orange">⚠️ Требует подтверждения</span>';
    return '<span class="sm-badge orange">⚠️ Требует подтверждения</span>';
  }

  function fmtRub(v){
    const s = String(v === null || v === undefined ? '' : v).trim();
    if(!s) return '—';
    return s + ' ₽';
  }

  function yesNo(v){
    return v ? 'да' : 'нет';
  }

  function renderPayInfo(it){
    if(!payInfoWrap || !payInfoBody) return;
    if(!it){
      payInfoWrap.style.display = 'none';
      payInfoBody.innerHTML = '';
      return;
    }

    const rate = fmtRub(it.shift_rate);
    const req = fmtRub(it.requested_amount);
    const appr = fmtRub(it.approved_amount);
    const isAppr = !!(it && it.is_amount_approved);
    const reqHas = !!(it && it.requested_amount);
    const reqNeed = !!(it && it.approval_required);
    const finalAmt = fmtRub((it && it.final_amount) ? it.final_amount : (it && it.total_amount));
    const ratingVal = (it && it.rating !== null && it.rating !== undefined) ? Number(it.rating) : null;
    const ratingText = (ratingVal !== null && Number.isFinite(ratingVal) && ratingVal >= 1 && ratingVal <= 5) ? ('⭐' + String(ratingVal)) : '—';

    let badge = '';
    if(reqNeed){
      badge = '<span class="sm-badge orange" style="margin-left:8px;">⚠️ Требует подтверждения</span>';
    } else if(reqHas){
      badge = '<span class="sm-badge green" style="margin-left:8px;">✅ Подтверждено</span>';
    }

    payInfoWrap.style.display = '';
    payInfoBody.innerHTML = (
      '<div class="sm-adj-item" style="margin-bottom:8px;">' +
        '<div>Ставка (по профилю)</div>' +
        '<b>' + rate + '</b>' +
      '</div>' +
      '<div class="sm-adj-item" style="margin-bottom:8px;">' +
        '<div>Запрошено сотрудником</div>' +
        '<b>' + req + '</b>' +
      '</div>' +
      '<div class="sm-adj-item" style="margin-bottom:8px;">' +
        '<div>Подтверждено</div>' +
        '<b>' + (reqHas ? yesNo(isAppr) : '—') + '</b>' +
      '</div>' +
      '<div class="sm-adj-item" style="margin-bottom:8px;">' +
        '<div>Оценка смены</div>' +
        '<b>' + ratingText + '</b>' +
      '</div>' +
      '<div class="sm-adj-item">' +
        '<div>Начисление к учёту' + badge + '</div>' +
        '<b>' + finalAmt + '</b>' +
      '</div>'
    );
  }

  async function load(){
    try {
      setMsg('Загрузка…');
      const url = apiBase() + '/salaries/shifts/list?user_id=' + encodeURIComponent(String(userId)) + '&month=' + encodeURIComponent(month);
      const r = await fetch(url);
      if(r.status === 403){
        window.location.href = '/crm/salaries';
        return;
      }
      const data = await r.json().catch(()=> ({}));
      if(!data || !data.ok){
        setMsg('Не удалось загрузить');
        return;
      }
      const items = Array.isArray(data.items) ? data.items : [];
      shifts = items;
      if(!items.length){
        setMsg('Смен нет');
        return;
      }
      body.innerHTML = items.map((it)=>{
        const day = String(it.day || '');
        const dayRating = (it && it.rating !== null && it.rating !== undefined) ? (' ⭐' + String(it.rating)) : '';
        const state = String(it.state || '');
        const planned = it.planned_hours ? String(it.planned_hours) : '—';
        const actual = it.actual_hours ? String(it.actual_hours) : '—';
        const total = fmtRub(it.final_amount || it.total_amount);
        const sid = Number(it.shift_id || 0);
        const review = (it && (it.needs_review || it.approval_required)) ? ' ⚠️' : '';
        const key = shiftKey(it);
        return (
          '<tr data-salary-shift-row="' + String(key) + '">' +
            '<td>' + day + dayRating + (review ? ' <span title="Требует подтверждения">⚠️</span>' : '') + '</td>' +
            '<td>' + statusBadge(state, it) + '</td>' +
            '<td>' + planned + ' / ' + actual + '</td>' +
            '<td><b>' + total + '</b></td>' +
          '</tr>'
        );
      }).join('');

      document.querySelectorAll('[data-salary-shift-row]').forEach((tr)=>{
        if(tr.dataset.bound === '1') return;
        tr.dataset.bound = '1';
        tr.addEventListener('click', ()=>{
          const key = String(tr.dataset.salaryShiftRow || '');
          if(!key) return;
          try {
            document.querySelectorAll('[data-salary-shift-row]').forEach((x)=>x.classList.remove('sm-row-active'));
            tr.classList.add('sm-row-active');
          } catch(_) {}
          selectShift(key);
        });
      });

      // auto select first
      if(!selectedKey && items.length){
        selectShift(shiftKey(items[0]));
      } else {
        selectShift(selectedKey);
      }

    } catch(e){
      setMsg('Ошибка');
    }
  }

  async function save(){
    if(!selectedKey) return;
    setErr(errEl, null);
    const it = findShift(selectedKey);
    if(!it) return;
    try {
      if(saveBtn) saveBtn.disabled = true;
      const payload = {
        month: month,
        state: String(stateEl && stateEl.value ? stateEl.value : 'worked').trim(),
        manual_hours: String(mhEl && mhEl.value ? mhEl.value : '').trim(),
        manual_amount_override: String(maEl && maEl.value ? maEl.value : '').trim(),
        comment: String(cEl && cEl.value ? cEl.value : '').trim(),
      };
      const sid = Number(it.shift_id || 0);
      const url = (sid > 0)
        ? (apiBase() + '/salaries/shifts/' + String(sid) + '/update')
        : (apiBase() + '/salaries/shifts/planned/confirm');
      const bodyPayload = (sid > 0)
        ? payload
        : Object.assign({ user_id: userId, day: String(it.day || '') }, payload);
      const r = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyPayload),
      });
      if(r.status === 403){
        window.location.href = '/crm/salaries';
        return;
      }
      const d = await r.json().catch(()=> ({}));
      if(!d || !d.ok){
        const code = String(d && d.error ? d.error : 'bad');
        if(code === 'comment_required'){
          setErr(errEl, 'Комментарий обязателен');
          return;
        }
        if(code === 'bad_manual_hours'){
          setErr(errEl, 'Неверные ручные часы');
          return;
        }
        if(code === 'bad_manual_amount'){
          setErr(errEl, 'Неверная ручная сумма');
          return;
        }
        setErr(errEl, 'Не удалось сохранить');
        return;
      }
      try { window.dispatchEvent(new CustomEvent('close-modal')); } catch(_) {}
      try { window.dispatchEvent(new CustomEvent('salary-grid-refresh')); } catch(_) {}
    } catch(e){
      setErr(errEl, 'Ошибка сохранения');
    } finally {
      if(saveBtn) saveBtn.disabled = false;
    }
  }

  async function confirmShift(){
    if(!selectedKey) return;
    setErr(errEl, null);
    const it = findShift(selectedKey);
    if(!it) return;

    try {
      if(confirmBtn) confirmBtn.disabled = true;
      const sid = Number(it.shift_id || 0);
      if(sid > 0){
        const r = await fetch(apiBase() + '/salaries/shifts/' + String(sid) + '/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}',
        });
        if(r.status === 403){ window.location.href = '/crm/salaries'; return; }
        const d = await r.json().catch(()=> ({}));
        if(!d || !d.ok){
          setErr(errEl, 'Не удалось подтвердить');
          return;
        }
      } else {
        // For planned-only, confirmation is done via planned/confirm which creates ShiftInstance on demand.
        const payload = {
          user_id: userId,
          day: String(it.day || ''),
          month: month,
          state: String(stateEl && stateEl.value ? stateEl.value : 'worked').trim(),
          manual_hours: String(mhEl && mhEl.value ? mhEl.value : '').trim(),
          manual_amount_override: String(maEl && maEl.value ? maEl.value : '').trim(),
          comment: String(cEl && cEl.value ? cEl.value : '').trim(),
        };
        const r = await fetch(apiBase() + '/salaries/shifts/planned/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if(r.status === 403){ window.location.href = '/crm/salaries'; return; }
        const d = await r.json().catch(()=> ({}));
        if(!d || !d.ok){
          const code = String(d && d.error ? d.error : 'bad');
          if(code === 'comment_required') setErr(errEl, 'Комментарий обязателен');
          else setErr(errEl, 'Не удалось подтвердить');
          return;
        }
      }

      try { window.dispatchEvent(new CustomEvent('close-modal')); } catch(_) {}
      try { window.dispatchEvent(new CustomEvent('salary-grid-refresh')); } catch(_) {}
    } catch(_e){
      setErr(errEl, 'Ошибка подтверждения');
    } finally {
      try { if(confirmBtn) confirmBtn.disabled = false; } catch(_){ }
    }
  }

  async function addAdj(){
    if(!selectedKey) return;
    const it = findShift(selectedKey);
    if(!it) return;
    const sid = Number(it.shift_id || 0);
    if(sid <= 0) return;
    setErr(adjErrEl, null);
    const delta = String(adjDeltaEl && adjDeltaEl.value ? adjDeltaEl.value : '').trim();
    const comment = String(adjCommentEl && adjCommentEl.value ? adjCommentEl.value : '').trim();
    if(!delta){
      setErr(adjErrEl, 'Введите сумму');
      return;
    }
    if(!comment){
      setErr(adjErrEl, 'Комментарий обязателен');
      return;
    }
    try {
      if(adjAddBtn) adjAddBtn.disabled = true;
      const r = await fetch(apiBase() + '/salaries/shifts/' + String(sid) + '/adjustments/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ month: month, delta_amount: delta, comment: comment }),
      });
      if(r.status === 403){
        window.location.href = '/crm/salaries';
        return;
      }
      const d = await r.json().catch(()=> ({}));
      if(!d || !d.ok){
        const code = String(d && d.error ? d.error : 'bad');
        if(code === 'comment_required'){
          setErr(adjErrEl, 'Комментарий обязателен');
          return;
        }
        if(code === 'bad_delta_amount'){
          setErr(adjErrEl, 'Неверная сумма');
          return;
        }
        setErr(adjErrEl, 'Не удалось добавить корректировку');
        return;
      }
      try { if(adjDeltaEl) adjDeltaEl.value = ''; } catch(_) {}
      try { if(adjCommentEl) adjCommentEl.value = ''; } catch(_) {}
      try { window.dispatchEvent(new CustomEvent('close-modal')); } catch(_) {}
      try { window.dispatchEvent(new CustomEvent('salary-grid-refresh')); } catch(_) {}
    } catch(e){
      setErr(adjErrEl, 'Ошибка');
    } finally {
      if(adjAddBtn) adjAddBtn.disabled = false;
    }
  }

  try {
    if(saveBtn) saveBtn.addEventListener('click', save);
    if(adjAddBtn) adjAddBtn.addEventListener('click', addAdj);
    if(amtSaveBtn) amtSaveBtn.addEventListener('click', saveRequestedAmount);
    if(amtApproveBtn) amtApproveBtn.addEventListener('click', approveRequestedAmount);
  } catch(e) {}

  load();
})();
</script>
